<!-- client/src/features/auth/forgot-password/forgot-password.html -->
<div class="min-h-screen flex items-center justify-center bg-base-200">
  <div class="card w-full max-w-sm bg-base-100 shadow-xl">
    <div class="card-body gap-4">

      <h2 class="card-title text-2xl justify-center">Ξέχασες τον κωδικό;</h2>

      @if (sent()) {
        <div class="alert alert-success">
          <svg xmlns="http://www.w3.org/2000/svg" class="size-5 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
          </svg>
          <span>Αν το email υπάρχει, θα λάβεις οδηγίες σύντομα.</span>
        </div>
        <a routerLink="/login" class="btn btn-ghost btn-sm">← Επιστροφή στη σύνδεση</a>
      } @else {
        <p class="text-sm text-base-content/70 text-center">
          Εισάγαγε το email σου και θα σου στείλουμε σύνδεσμο επαναφοράς.
        </p>

        @if (error()) {
          <div class="alert alert-error text-sm">{{ error() }}</div>
        }

        <form (ngSubmit)="submit()" class="flex flex-col gap-3">
          <fieldset class="fieldset">
            <legend class="fieldset-legend">Email</legend>
            <input type="email" class="input input-bordered w-full"
                   placeholder="you@example.com"
                   [ngModel]="email()" (ngModelChange)="email.set($event)"
                   name="email" required />
          </fieldset>

          <button type="submit" class="btn btn-primary w-full" [disabled]="loading()">
            @if (loading()) { <span class="loading loading-spinner loading-sm"></span> }
            Αποστολή συνδέσμου
          </button>
        </form>

        <a routerLink="/login" class="btn btn-ghost btn-sm">← Επιστροφή στη σύνδεση</a>
      }

    </div>
  </div>
</div>

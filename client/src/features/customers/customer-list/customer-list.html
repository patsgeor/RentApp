<div class="space-y-5">

  <!-- Page header -->
  <div class="flex items-center justify-between">
    <div>
      <h1 class="text-2xl font-bold">Πελάτες</h1>
      <p class="text-sm text-base-content/60 mt-0.5">Διαχείριση πελατολογίου</p>
    </div>
    <a routerLink="/customer/new" class="btn btn-primary gap-2">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="size-5">
        <path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15" />
      </svg>
      Νέος Πελάτης
    </a>
  </div>

  @if (error()) {
    <div role="alert" class="alert alert-error">
      <!-- <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="size-5">
        <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m-9.303 3.376c-.866 1.5.217 3.374 1.948 3.374h14.71c1.73 0 2.813-1.874 1.948-3.374L13.949 3.378c-.866-1.5-3.032-1.5-3.898 0L2.697 16.126ZM12 15.75h.007v.008H12v-.008Z" />
      </svg> -->
      <span>{{ error() }}</span>
    </div>
  }

  <!-- Στατιστικά: πάντα ορατά, ανεξάρτητα από τη λίστα -->
<!-- KPI cards — clickable filter -->
  <app-customer-stats
    [stats]="stats()"
    [activeFilter]="activeFilter()"
    (filterChange)="onFilterChange($event)" />

  @if (result(); as res) {
    <app-customer-table
      [items]="res.items"
      [pagination]="res.metadata"
      (pageChange)="onPageChange($event)"
      (searchChange)="onSearch($event)"
      (deleted)="onDeleted()"
      (restored)="onRestored()" />
  } @else if (loading()) {
    <div class="card bg-base-100 shadow-sm border border-base-200 h-64 animate-pulse"></div>
  }

</div>
